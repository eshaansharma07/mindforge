<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Candidate Dashboard | Mind Forge 2026</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="grid-glow"></div>
  <main class="page">
    <nav class="nav reveal">
      <div class="brand">
        <img src="/assets/ai-alliance-logo.svg" alt="AI Alliance Logo" />
        <div>Candidate Dashboard</div>
      </div>
      <div class="nav-links">
        <a class="chip" href="/index.html">Back to Home</a>
      </div>
    </nav>

    <section class="section">
      <article class="card reveal">
        <h2>Team Login</h2>
        <form id="candidateLoginForm">
          <label>Team ID *</label>
          <input class="input" name="teamId" placeholder="MF-XXXXXXXX" required />
          <label>Registered Email *</label>
          <input class="input" name="email" type="email" required />
          <button class="btn primary" type="submit">Open Dashboard</button>
          <p id="loginStatus" class="status"></p>
        </form>
      </article>

      <article class="card reveal">
        <h2>Live Rapid Round</h2>
        <p class="muted">When controller launches a question, it appears here instantly. You get 60 seconds.</p>
        <div class="countdown" id="countdown">--</div>
      </article>
    </section>

    <section class="section">
      <article class="card reveal">
        <h2>Team Details</h2>
        <div id="teamBox" class="list"></div>
      </article>

      <article class="card reveal">
        <h2>Announcements</h2>
        <div id="announcementBox" class="list"></div>
      </article>
    </section>

    <section class="card reveal">
      <h2>Current Question</h2>
      <div id="questionText" class="item muted">No active question yet.</div>
      <div id="optionsBox" class="options"></div>
      <p id="answerStatus" class="status"></p>
    </section>

    <footer class="footer reveal">
      <div class="muted">Powered by</div>
      <img src="/assets/unstop-logo.svg" alt="Unstop Logo" />
    </footer>
  </main>

  <script src="/scripts/candidate.js"></script>
</body>
</html>
