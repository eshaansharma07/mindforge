<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Judges Access | Mind Forge 2026</title>
  <script>
    document.documentElement.dataset.theme = localStorage.getItem("mindforge_theme") || "dark";
  </script>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="grid-glow"></div>
  <main class="page">
    <nav class="nav reveal">
      <div class="brand">
        <span class="quick-brand">MIND FORGE</span>
      </div>
      <div class="nav-actions">
        <div class="nav-links">
          <a href="/index.html">Home</a>
          <a href="/candidate.html">Portal</a>
          <a href="/coding-round.html">Round 2 Coding</a>
          <a href="/admin.html">Controller</a>
          <a href="/judges.html">Judges</a>
        </div>
        <button class="theme-toggle" type="button" data-theme-toggle aria-label="Switch theme">Light Mode</button>
      </div>
    </nav>

    <section class="content">
      <header class="section-title reveal">
        <h2>Judges Access</h2>
        <div class="divider"></div>
        <p>Authorized judges can review Round 1 and Round 2 submissions and record official verdicts here.</p>
      </header>

      <section class="admin-access reveal">
        <article class="register-wrap admin-access-card">
          <h3>Judge Login</h3>
          <form id="judgeLoginForm">
            <label>Judge Key</label>
            <input class="input" name="key" type="password" required />
            <button class="btn primary" type="submit">Open Judges Portal</button>
            <p id="judgeAccessStatus" class="status"></p>
          </form>
        </article>
      </section>
    </section>
  </main>

  <script src="/scripts/theme.js"></script>
  <script src="/scripts/judges-login.js"></script>
</body>
</html>
